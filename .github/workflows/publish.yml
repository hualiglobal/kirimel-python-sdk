name: Publish to Packagist

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Update version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          composer config version $VERSION

      - name: Publish to Packagist
        run: |
          echo "Release ${{ github.ref_name }} ready for publishing"
          echo "Manual action required: Submit to https://packagist.org/packages/submit"
